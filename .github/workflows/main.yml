<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edilberto Patiño Guerra</title>
    <style>
        body {
            background-color: #1a4b8c; /* Azul */
            color: white; /* Letras blancas */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            padding: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .titulo-grande {
            font-size: 2rem;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .contacto {
            margin-top: 30px;
            font-size: 1.2rem;
            line-height: 1.6;
        }
        
        .contacto div {
            margin: 10px 0;
        }
        
        /* Efectos decorativos */
        .decoracion {
            width: 100px;
            height: 5px;
            background-color: white;
            margin: 20px auto;
            border-radius: 5px;
        }
        
        .icono {
            display: inline-block;
            margin-right: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EDILBERTO PATIÑO GUERRA</h1>
        
        <div class="decoracion"></div>
        
        <div class="titulo-grande">
            PROGRAMACIÓN Y ANÁLISIS DE SISTEMAS TIC
        </div>
        
        <div class="decoracion"></div>
        
        <div class="contacto">
            <div>
                <span class="icono">📱</span>
                <strong>Teléfono:</strong> 507 6679-5170
            </div>
            <div>
                <span class="icono">✉️</span>
                <strong>Email:</strong> epatino1662@gmail.com
            </div>
        </div>
    </div>
</body>
</html>
